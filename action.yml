name: "Setup C3X"
description: "Install the C3X CLI for cloud cost estimation with automatic branded PR comments"
branding:
  icon: "dollar-sign"
  color: "blue"

inputs:
  version:
    description: "C3X version to install (e.g. 1.0.0). Defaults to latest."
    required: false
    default: "latest"

outputs:
  token:
    description: "GitHub token for c3x comment. Branded C3X Cloud token if the C3X Cloud app is installed, empty otherwise."
    value: ${{ steps.c3x-token.outputs.token }}

runs:
  using: "composite"
  steps:
    - name: Determine version
      id: version
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -fsSL https://api.github.com/repos/c3xdev/c3x/releases/latest | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Determine platform
      id: platform
      shell: bash
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac
        echo "os=$OS" >> "$GITHUB_OUTPUT"
        echo "arch=$ARCH" >> "$GITHUB_OUTPUT"

    - name: Cache C3X binary
      id: cache
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/c3x
        key: c3x-${{ steps.version.outputs.version }}-${{ steps.platform.outputs.os }}-${{ steps.platform.outputs.arch }}

    - name: Install C3X
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        OS="${{ steps.platform.outputs.os }}"
        ARCH="${{ steps.platform.outputs.arch }}"
        URL="https://github.com/c3xdev/c3x/releases/download/v${VERSION}/c3x-${OS}-${ARCH}.tar.gz"
        curl -fsSL "$URL" | tar -xz -C /usr/local/bin
        mv /usr/local/bin/c3x-${OS}-${ARCH} /usr/local/bin/c3x
        chmod +x /usr/local/bin/c3x

    - name: Verify installation
      shell: bash
      run: c3x --version

    - name: Get C3X Cloud token
      id: c3x-token
      shell: bash
      run: |
        # Get the C3X Cloud app installation ID for this repo
        INSTALLATION=$(curl -fsSL \
          -H "Authorization: token ${{ github.token }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/installation" 2>/dev/null)

        INSTALL_ID=$(echo "$INSTALLATION" | grep '"id"' | head -1 | sed 's/[^0-9]//g')

        if [ -z "$INSTALL_ID" ]; then
          echo "C3X Cloud app not installed on this repo. Using default GITHUB_TOKEN."
          echo "token=${{ github.token }}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Exchange installation ID for a branded token via C3X Cloud token service
        RESPONSE=$(curl -fsSL -X POST \
          -H "Content-Type: application/json" \
          -d "{\"installation_id\": $INSTALL_ID}" \
          "https://token.c3x.dev" 2>/dev/null)

        TOKEN=$(echo "$RESPONSE" | grep '"token"' | head -1 | sed 's/.*"token":"\([^"]*\)".*/\1/')

        if [ -z "$TOKEN" ]; then
          echo "Failed to get C3X Cloud token. Falling back to GITHUB_TOKEN."
          echo "token=${{ github.token }}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "::add-mask::$TOKEN"
        echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
        echo "Using C3X Cloud branded token for PR comments."
